<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap');
        
        body { margin: 0; padding: 0; background-color: #030805; color: #e0f0e4; font-family: 'JetBrains Mono', 'Courier New', monospace; }
        .wrapper { width: 100%; table-layout: fixed; background-color: #030805; padding: 40px 0; }
        .container { max-width: 450px; margin: 0 auto; background-color: #060d08; border: 1px solid rgba(0, 255, 65, 0.2); border-radius: 16px; box-shadow: 0 0 50px rgba(0, 255, 65, 0.1); overflow: hidden; text-align: center; }
        
        .header { padding: 40px 40px 0; }
        h2 { color: #00ff41; text-transform: uppercase; font-size: 20px; margin: 0; letter-spacing: 2px; }
        
        .content { padding: 30px 40px 40px; }
        p { color: #6b8f72; font-size: 14px; line-height: 1.6; margin: 0 0 20px; }
        
        .otp-box { margin: 30px 0; padding: 20px; background-color: rgba(0, 255, 65, 0.05); border: 1px dashed rgba(0, 255, 65, 0.3); border-radius: 8px; }
        .otp-code { font-size: 36px; letter-spacing: 12px; color: #00ff41; font-weight: bold; margin: 0; }
        
        .timer-info { font-size: 11px; color: #3d5c43; font-style: italic; }
        
        .footer { padding: 20px 40px; background-color: rgba(0, 255, 65, 0.02); border-top: 1px solid rgba(0, 255, 65, 0.1); font-size: 10px; color: #2d4c33; }
        
        @media only screen and (max-width: 450px) {
            .container { width: 90% !important; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <h2>VERIFY_IDENTITY</h2>
            </div>
            
            <div class="content">
                <p>Access requested for <strong>{{ user_email }}</strong>. Use the following temporary handshake code to proceed:</p>
                
                <div class="otp-box">
                    <div class="otp-code">{{ otp }}</div>
                </div>
                
                <div class="timer-info">Signal expires in 10 minutes.</div>
            </div>
            
            <div class="footer">
                [PROTOCOL]: ALPHA-V4 // [SECURITY]: ENCRYPTED_CHANNEL
            </div>
        </div>
    </div>
</body>
</html>
