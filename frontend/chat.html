<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptX — AI Chat Terminal</title>
  <meta name="description" content="PromptX interactive AI prompt engineering terminal. Enhance, analyze, and A/B test your prompts.">
  <meta name="theme-color" content="#00ff41">
  <link rel="icon" type="image/svg+xml" href="Public/star.svg">
  <link rel="stylesheet" href="index.css">
  <style>
    /* Chat Page Specific Overrides */
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow: hidden;
    }

    .chat-page-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 56px;
      background: rgba(3, 8, 5, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 100;
    }

    .chat-page-nav .nav-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .chat-page-nav .back-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.4rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: var(--transition-fast);
      background: transparent;
      cursor: pointer;
    }

    .chat-page-nav .back-btn:hover {
      color: var(--primary);
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .chat-page-nav .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
    }

    .chat-page-nav .brand img {
      width: 28px; height: 28px;
      filter: drop-shadow(0 0 6px rgba(0, 255, 65, 0.4));
    }

    .chat-page-nav .brand span {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 0.95rem;
      color: var(--primary);
      letter-spacing: 0.08em;
    }

    .chat-page-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    /* Mode tabs bar */
    .chat-mode-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-mode-tabs {
      display: flex;
      gap: 0.25rem;
      background: rgba(0,0,0,0.3);
      padding: 0.3rem;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .chat-mode-tab {
      padding: 0.45rem 1.15rem;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition-fast);
      font-family: var(--font-body);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .chat-mode-tab:hover { color: var(--text-primary); }

    .chat-mode-tab.active {
      background: var(--primary);
      color: var(--bg-dark);
      font-weight: 700;
    }

    .chat-mode-tab .tab-icon {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      opacity: 0.8;
    }

    .api-key-inline {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .api-key-inline label {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    .api-key-inline input {
      width: 180px;
      padding: 0.35rem 0.6rem;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.75rem;
      font-family: var(--font-mono);
      outline: none;
      transition: var(--transition);
    }

    .api-key-inline input:focus {
      border-color: var(--primary);
    }

    /* Chat area full height */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .chat-area .welcome-screen {
      min-height: 100%;
    }

    /* Input pinned at bottom */
    .chat-input-bottom {
      padding: 1rem 2rem 1.5rem;
      border-top: 1px solid var(--border);
      background: rgba(3, 8, 5, 0.8);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    /* Terminal-style status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.35rem 1.5rem;
      background: rgba(0, 0, 0, 0.4);
      border-top: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .status-bar .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--primary);
      display: inline-block;
      margin-right: 0.4rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @media (max-width: 768px) {
      .chat-mode-bar {
        flex-direction: column;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
      }

      .api-key-inline {
        width: 100%;
      }

      .api-key-inline input {
        flex: 1;
        width: auto;
      }

      .chat-area {
        padding: 1rem;
      }

      .chat-input-bottom {
        padding: 0.75rem 1rem 1rem;
      }

      .chat-page-nav {
        padding: 0 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- Background -->
  <div class="cyber-bg"></div>
  <div class="scanlines"></div>
  <div class="particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  </div>

  <!-- Top Nav -->
  <nav class="chat-page-nav">
    <div class="nav-left">
      <a href="index.html" class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </a>
      <a href="index.html" class="brand">
        <img src="Public/bot-img.png" alt="PromptX">
        <span>PROMPTX</span>
      </a>
    </div>
    <div class="nav-actions">
      <a href="https://github.com/Santosh-Prasad-Verma/PromptX" target="_blank" class="nav-github" style="font-size:0.8rem; padding:0.4rem 0.8rem;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
    </div>
  </nav>

  <!-- Mode Tabs -->
  <div class="chat-mode-bar">
    <div class="chat-mode-tabs" id="app-mode-tabs">
      <button class="chat-mode-tab active" data-mode="enhance">
        <span class="tab-icon">[&gt;_]</span> Enhance
      </button>
      <button class="chat-mode-tab" data-mode="analyze">
        <span class="tab-icon">[///]</span> Analyze
      </button>
      <button class="chat-mode-tab" data-mode="compare">
        <span class="tab-icon">[&lt;&gt;]</span> Compare
      </button>
    </div>
    <div class="api-key-inline">
      <label>&gt; API_KEY:</label>
      <input type="password" id="api-key-input" placeholder="optional">
    </div>
  </div>

  <!-- Chat Messages -->
  <div class="chat-area" id="chat-messages">
    <div class="welcome-screen" id="welcome-screen">
      <img src="Public/bot-img.png" alt="PromptX" class="welcome-logo">
      <h1>PROMPTX</h1>
      <p>Transform your prompts with AI</p>
      
      <div class="quick-actions">
        <button class="quick-action" data-action="enhance">
          <i data-lucide="terminal"></i>
          <div>
            <strong>Enhance Prompt</strong>
            <span>Make it professional</span>
          </div>
        </button>
        <button class="quick-action" data-action="analyze">
          <i data-lucide="bar-chart-3"></i>
          <div>
            <strong>Analyze Quality</strong>
            <span>Get detailed scores</span>
          </div>
        </button>
        <button class="quick-action" data-action="compare">
          <i data-lucide="git-compare"></i>
          <div>
            <strong>Compare Variations</strong>
            <span>A/B test prompts</span>
          </div>
        </button>
      </div>
    </div>
  </div>

  <!-- Chat Input -->
  <div class="chat-input-bottom">
    <div class="chat-input-wrapper">
      <div class="custom-model-select" id="custom-model-select">
        <div class="select-selected">
          <i data-lucide="bot"></i> <span>Auto (Fallback)</span>
          <i data-lucide="chevron-down" class="chevron"></i>
        </div>
        <div class="select-items select-hide">
          <div data-value="auto" data-icon="bot" class="same-as-selected"><i data-lucide="bot"></i> <span>Auto (Fallback)</span></div>
          <div data-value="gemini" data-icon="sparkles"><i data-lucide="sparkles"></i> <span>Gemini 2.0</span></div>
          <div data-value="nvidia_mistral" data-icon="brain"><i data-lucide="brain"></i> <span>NVIDIA Mistral</span></div>
          <div data-value="nvidia_qwen" data-icon="hexagon"><i data-lucide="hexagon"></i> <span>NVIDIA Qwen</span></div>
          <div data-value="huggingface" data-icon="smile"><i data-lucide="smile"></i> <span>HuggingFace</span></div>
        </div>
      </div>
      <textarea id="chat-input" placeholder="Enter a prompt to enhance..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" disabled>
        <i data-lucide="arrow-up"></i>
      </button>
    </div>
    <div class="input-footer">
      <span class="mode-indicator" id="mode-indicator">Enhance Mode</span>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span><span class="status-dot"></span> SYSTEM ONLINE</span>
    <span>MODEL: AUTO // LATENCY: &lt;200ms</span>
  </div>

  <!-- Toast -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <script src="index.js"></script>
</body>
</html>
