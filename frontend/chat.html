<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptX — AI Chat Terminal</title>
  <meta name="description" content="PromptX interactive AI prompt engineering terminal.">
  <meta name="theme-color" content="#00ff41">
  <link rel="icon" type="image/svg+xml" href="Public/star.svg">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="chat.css">
</head>
<body>

  <!-- Background -->
  <div class="cyber-bg"></div>
  <div class="scanlines"></div>

  <!-- Sidebar -->
  <aside class="chat-sidebar" id="chat-sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="sidebar-brand">
        <img src="Public/bot-img.png" alt="PromptX">
        <span>PROMPTX</span>
      </a>
      <button class="sidebar-close-btn" id="sidebar-close" title="Close sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <button class="new-chat-btn" id="new-chat-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      New Chat
    </button>

    <!-- Mode Selection -->
    <div class="sidebar-section">
      <div class="sidebar-label">[SYS] MODE</div>
      <div class="mode-list" id="mode-list">
        <button class="mode-item active" data-mode="enhance">
          <span class="mode-icon">[&gt;_]</span> Enhance
        </button>
        <button class="mode-item" data-mode="analyze">
          <span class="mode-icon">[///]</span> Analyze
        </button>
        <button class="mode-item" data-mode="compare">
          <span class="mode-icon">[&lt;&gt;]</span> Compare
        </button>
      </div>
    </div>

    <!-- Chat History -->
    <div class="sidebar-section sidebar-history-section">
      <div class="sidebar-label">[LOG] HISTORY</div>
      <div class="history-list" id="history-list">
        <!-- Populated by JS -->
        <div class="history-empty" id="history-empty">
          <span style="opacity: 0.4;">No chats yet</span>
        </div>
      </div>
    </div>

    <!-- API Key -->
    <div class="sidebar-footer">
      <div class="sidebar-label">[KEY] API</div>
      <input type="password" id="api-key-input" placeholder="Optional API key" class="sidebar-api-input">
      <div class="sidebar-model-info" id="sidebar-model-info">MODEL: AUTO</div>
    </div>
  </aside>

  <!-- Main Chat Area -->
  <main class="chat-main" id="chat-main">
    <!-- Top Bar -->
    <div class="chat-topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle-btn" id="sidebar-toggle" title="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="topbar-title">
          <span class="topbar-mode" id="topbar-mode">[&gt;_] Enhance Mode</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="custom-model-select" id="custom-model-select">
          <div class="select-selected">
            <i data-lucide="bot"></i> <span>Auto</span>
            <i data-lucide="chevron-down" class="chevron"></i>
          </div>
          <div class="select-items select-hide">
            <div data-value="auto" data-icon="bot" class="same-as-selected"><i data-lucide="bot"></i> <span>Auto (Fallback)</span></div>
            <div data-value="gemini" data-icon="sparkles"><i data-lucide="sparkles"></i> <span>Gemini 2.0</span></div>
            <div data-value="nvidia_mistral" data-icon="brain"><i data-lucide="brain"></i> <span>NVIDIA Mistral</span></div>
            <div data-value="nvidia_qwen" data-icon="hexagon"><i data-lucide="hexagon"></i> <span>NVIDIA Qwen</span></div>
            <div data-value="huggingface" data-icon="smile"><i data-lucide="smile"></i> <span>HuggingFace</span></div>
          </div>
        </div>
        <a href="https://github.com/Santosh-Prasad-Verma/PromptX" target="_blank" class="topbar-github" title="GitHub">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        </a>
      </div>
    </div>

    <!-- Chat Messages -->
    <div class="chat-messages-area" id="chat-messages">
      <div class="welcome-screen" id="welcome-screen">
        <img src="Public/bot-img.png" alt="PromptX" class="welcome-logo">
        <h1>PROMPTX</h1>
        <p>Transform your prompts with AI</p>
        
        <div class="welcome-cards">
          <button class="welcome-card" data-action="enhance">
            <div class="wc-icon">[&gt;_]</div>
            <div class="wc-text">
              <strong>Enhance Prompt</strong>
              <span>Make it professional and detailed</span>
            </div>
          </button>
          <button class="welcome-card" data-action="analyze">
            <div class="wc-icon">[///]</div>
            <div class="wc-text">
              <strong>Analyze Quality</strong>
              <span>Get scores and improvement tips</span>
            </div>
          </button>
          <button class="welcome-card" data-action="compare">
            <div class="wc-icon">[&lt;&gt;]</div>
            <div class="wc-text">
              <strong>Compare Variations</strong>
              <span>A/B test prompt variations</span>
            </div>
          </button>
        </div>

        <div class="welcome-examples">
          <div class="sidebar-label" style="margin-bottom: 0.75rem;">TRY THESE:</div>
          <button class="example-chip" onclick="fillPrompt('Write a blog post about artificial intelligence')">Write a blog about AI</button>
          <button class="example-chip" onclick="fillPrompt('Create a Python function to sort a list of dictionaries by key')">Sort list of dicts in Python</button>
          <button class="example-chip" onclick="fillPrompt('Design a marketing strategy for a SaaS product launch')">SaaS marketing strategy</button>
        </div>
      </div>
    </div>

    <!-- Chat Input -->
    <div class="chat-input-bottom">
      <div class="chat-input-wrapper">
        <textarea id="chat-input" placeholder="Enter a prompt to enhance..." rows="1"></textarea>
        <button class="send-btn" id="send-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </div>
      <div class="input-footer">
        <span class="mode-indicator" id="mode-indicator">[&gt;_] Enhance Mode</span>
        <span class="char-count" id="char-count">0 chars</span>
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <script src="chat.js"></script>
</body>
</html>
